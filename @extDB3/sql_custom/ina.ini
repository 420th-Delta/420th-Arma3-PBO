;; See below reference for writing new queries:
;; https://github.com/SteezCram/extDB3/wiki/extDB3---sql_custom.ini
[Default]
Version = 1
Strip Chars = ";[]"
Strip Chars Mode = 0
Input SQF Parser = false
Number of Retrys = 5

[getProtocolVersion]
SQL1_1 = SELECT 2.0;
OUTPUT = 1

[getPlayerWhitelist]
SQL1_1 = SELECT steam_id, role_s3, role_cas, role_s1, role_opfor, role_all, role_admin, role_moderator, role_trusted, role_media, role_curator, role_developer, role_donator FROM users WHERE steam_id = ?;
SQL1_INPUTS = 1
OUTPUT = 1-string, 2-bool, 3-bool, 4-bool, 5-bool, 6-bool, 7-bool, 8-bool, 9-bool, 10-bool, 11-bool, 12-bool, 13-bool

[getPlayerCosmeticSkins]
SQL1_1 = SELECT DISTINCT l.skin_name, SUBSTRING_INDEX(COALESCE(NULLIF(o.completed_paa_path, ''), l.paa_path), '/', -1) AS paa_filename FROM cosmetic_orders o JOIN cosmetic_listings l ON l.id = o.listing_id JOIN users u ON u.id = o.buyer_user_id WHERE u.steam_id = ? AND o.status = 'complete' AND COALESCE(NULLIF(o.completed_paa_path, ''), l.paa_path) IS NOT NULL ORDER BY l.skin_name ASC;
SQL1_INPUTS = 1
OUTPUT = 1-string, 2-string
